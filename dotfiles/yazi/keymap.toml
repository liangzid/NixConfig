[manager]
keymap = [
  { on = ["<Enter>"], run = "open", desc = "Open selected" },
  { on = ["o"], run = "open", desc = "Open selected" },
  { on = ["e"], run = "edit", desc = "Edit with emacsclient" },
  { on = ["<Space>"], run = "select --state=true", desc = "Select current file" },
  { on = ["v"], run = "visual_mode", desc = "Enter visual mode" },
  { on = ["<C-s>"], run = "search", desc = "Search files by name" },
  { on = ["y"], run = "yank", desc = "Yank selected" },
  { on = ["x"], run = "yank --cut", desc = "Cut selected" },
  { on = ["p"], run = "paste", desc = "Paste yanked" },
  { on = ["d"], run = "remove", desc = "Move to trash" },
  { on = ["D"], run = "remove --permanently", desc = "Permanently delete" },
  { on = ["a"], run = "create", desc = "Create file/dir" },
  { on = ["r"], run = "rename", desc = "Rename selected" },
  { on = ["."], run = "hidden", desc = "Toggle hidden files" },
  { on = ["z"], run = "jump zoxide", desc = "Jump with zoxide" },
  { on = ["Z"], run = "jump fzf", desc = "Jump with fzf" },
  { on = ["<C-p>"], run = "plugin --sync -- args='--toggle-pane=preview'", desc = "Toggle preview" },
  { on = ["H"], run = "back", desc = "Go back" },
  { on = ["L"], run = "forward", desc = "Go forward" },
  { on = ["<C-r>"], run = "refresh", desc = "Refresh" },
  { on = ["g"], run = "goto top", desc = "Go to top" },
  { on = ["G"], run = "goto bottom", desc = "Go to bottom" },
  { on = ["/"], run = "filter", desc = "Filter files" },
  { on = ["~"], run = "cd ~", desc = "Go to home" },
  { on = ["-"], run = "cd -", desc = "Go to previous" },
  { on = ["q"], run = "quit", desc = "Quit" },
  { on = ["<Esc>"], run = "escape", desc = "Escape" },
]
